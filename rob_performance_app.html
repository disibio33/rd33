<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RD33 — Performance Journal</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RD33">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080A0F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%23080A0F'/%3E%3Ctext x='256' y='320' font-family='Arial Black,sans-serif' font-size='260' font-weight='900' fill='%23F59E0B' text-anchor='middle'%3E33%3C/text%3E%3Ctext x='256' y='430' font-family='Arial,sans-serif' font-size='72' fill='%23E11D48' text-anchor='middle' letter-spacing='8'%3ERD%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --black:   #080A0F;
  --deep:    #0D1117;
  --card:    #111827;
  --border:  #1F2937;
  --border2: #374151;
  --text:    #E5E7EB;
  --muted:   #6B7280;
  --gold:    #F59E0B;
  --red:     #EF4444;
  --green:   #10B981;
  --yellow:  #F59E0B;
  --accent:  #E11D48;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--black);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(225,29,72,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 90% 90%, rgba(245,158,11,0.04) 0%, transparent 50%);
}
.container { max-width:680px; margin:0 auto; padding:0 16px 100px; position:relative; z-index:1; }

/* HEADER */
.header { padding:26px 0 18px; text-align:center; border-bottom:1px solid var(--border); margin-bottom:22px; }
.header-badge { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent); letter-spacing:3px; text-transform:uppercase; margin-bottom:6px; }
.header h1 { font-family:'Bebas Neue',cursive; font-size:clamp(38px,10vw,58px); letter-spacing:4px; line-height:1; margin-bottom:4px; }
.header h1 span { color:var(--gold); }
.header-sub { font-size:12px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

/* TABS */
.tabs { display:flex; gap:4px; background:var(--deep); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:22px; }
.tab { flex:1; padding:13px 8px; border:none; background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; border-radius:8px; transition:all 0.2s; white-space:nowrap; text-align:center; }
.tab.active { background:var(--accent); color:white; }
.tab:hover:not(.active) { background:var(--border); color:var(--text); }

/* PANELS */
.panel { display:none; }
.panel.active { display:block; animation:fadeUp 0.25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* SECTION LABEL */
.section-label {
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:3px;
  text-transform:uppercase; color:var(--gold); margin:20px 0 10px;
  display:flex; align-items:center; gap:10px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* CARD */
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:12px; }

/* GRID */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

/* FIELD */
.field { display:flex; flex-direction:column; gap:5px; }
.field label { font-size:11px; font-weight:500; color:var(--muted); letter-spacing:0.5px; text-transform:uppercase; }
.field input, .field select, .field textarea {
  background:var(--deep); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px;
  padding:11px 14px; width:100%; outline:none; -webkit-appearance:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color:var(--gold); box-shadow:0 0 0 3px rgba(245,158,11,0.1);
}
.field textarea { resize:vertical; min-height:90px; line-height:1.6; }
.field select option { background:var(--deep); }
.field input[type="number"] { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:600; text-align:center; }

/* SLIDER */
.slider-wrap { display:flex; align-items:center; gap:12px; }
.slider-wrap input[type="range"] {
  flex:1; -webkit-appearance:none; height:4px; background:var(--border2);
  border-radius:2px; border:none; padding:0; box-shadow:none;
}
.slider-wrap input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
  background:var(--gold); cursor:pointer; border:2px solid var(--black);
}
.slider-val { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:600; color:var(--gold); min-width:28px; text-align:center; }

/* DATE BAR */
.date-bar {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--deep); border:1px solid var(--border); border-radius:10px;
  padding:12px 16px; margin-bottom:20px;
}
.date-bar .date-label { font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:2px; }

/* SUBMIT BTN */
.btn-submit {
  width:100%; padding:16px; background:var(--accent); border:none; border-radius:12px;
  color:white; font-family:'Bebas Neue',cursive; font-size:20px; letter-spacing:3px;
  cursor:pointer; transition:all 0.2s; margin-top:8px;
}
.btn-submit:hover { background:#be123c; transform:translateY(-1px); box-shadow:0 8px 24px rgba(225,29,72,0.3); }
.btn-submit:active { transform:translateY(0); }
.btn-submit:disabled { opacity:0.5; cursor:default; transform:none; box-shadow:none; }

/* ── HABIT CHECKLIST ── */
.habit-cat {
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2.5px;
  text-transform:uppercase; color:var(--muted); margin:20px 0 10px; padding-left:2px;
  display:flex; align-items:center; gap:10px;
}
.habit-cat::after { content:''; flex:1; height:1px; background:var(--border); }

.check-item {
  display:flex; align-items:flex-start; gap:12px; padding:12px 14px;
  background:var(--deep); border:1px solid var(--border); border-radius:10px;
  cursor:pointer; transition:all 0.15s; user-select:none; margin-bottom:8px;
}
.check-item:hover { border-color:var(--border2); }
.check-item.checked { background:rgba(16,185,129,0.07); border-color:rgba(16,185,129,0.3); }

.check-box {
  width:22px; height:22px; border-radius:5px; border:2px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.15s; font-size:13px; color:transparent;
  margin-top:1px;
}
.check-item.checked .check-box { background:var(--green); border-color:var(--green); color:white; }

.check-content { flex:1; }
.check-title { font-size:14px; font-weight:500; color:var(--muted); transition:color 0.15s; line-height:1.3; margin-bottom:3px; }
.check-desc { font-size:12px; color:var(--border2); line-height:1.5; transition:color 0.15s; }
.check-item.checked .check-title { color:var(--text); }
.check-item.checked .check-desc { color:var(--muted); }

/* PROGRESS */
.progress-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:4px; }
.progress-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.progress-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1.5px; }
.progress-pct { font-family:'Bebas Neue',cursive; font-size:32px; color:var(--gold); line-height:1; }
.progress-track { background:var(--deep); border-radius:6px; height:8px; overflow:hidden; }
.progress-bar { height:100%; width:0%; background:var(--green); border-radius:6px; transition:width 0.4s, background 0.4s; }
.progress-count { font-size:12px; color:var(--muted); margin-top:8px; }

/* EMPTY STATE */
.empty-state { text-align:center; padding:48px 24px; color:var(--muted); }
.empty-icon { font-size:40px; margin-bottom:12px; }
.empty-state p { font-size:14px; line-height:1.7; }

/* TOAST */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--green); color:white; padding:12px 24px;
  border-radius:10px; font-weight:600; font-size:14px; letter-spacing:0.5px;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index:1000; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.toast.show { transform:translateX(-50%) translateY(0); }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-badge">Performance Journal</div>
    <h1>RD<span>33</span></h1>
    <div class="header-sub">Serie B Nazionale &nbsp;&middot;&nbsp; Italy</div>
  </div>

  <!-- TABS — just two -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('log',this)">&#x1F4CB;&nbsp; Daily Log</button>
    <button class="tab" onclick="switchTab('habits',this)">&#x2705;&nbsp; Habits</button>
  </div>


  <!-- ═══════════════════════════════════════════
       TAB 1 — DAILY LOG
  ═══════════════════════════════════════════ -->
  <div class="panel active" id="panel-log">

    <div class="date-bar">
      <div class="date-label" id="log-date">—</div>
      <select id="log-day-type"
        style="background:transparent;border:none;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;outline:none;">
        <option value="">DAY TYPE</option>
        <option>MON &#8212; OFF</option>
        <option>TUE &#8212; HEAVY</option>
        <option>WED &#8212; LATE</option>
        <option>THU &#8212; HEAVY</option>
        <option>FRI &#8212; LIGHT</option>
        <option>FRI &#8212; MOD</option>
        <option>SAT &#8212; GAME</option>
        <option>SAT &#8212; LIGHT</option>
        <option>SUN &#8212; GAME</option>
        <option>SUN &#8212; OFF</option>
      </select>
    </div>

    <!-- BIOMETRICS -->
    <div class="section-label">Biometrics</div>
    <div class="card">
      <div class="grid-3" style="margin-bottom:12px;">
        <div class="field"><label>HRV</label><input type="number" id="hrv" placeholder="78" min="0" max="200"></div>
        <div class="field"><label>Recovery %</label><input type="number" id="recovery" placeholder="89" min="0" max="100"></div>
        <div class="field"><label>Strain</label><input type="number" id="strain" placeholder="16.6" step="0.1" min="0" max="21"></div>
      </div>
      <div class="grid-3" style="margin-bottom:12px;">
        <div class="field"><label>Sleep %</label><input type="number" id="sleep-score" placeholder="89" min="0" max="100"></div>
        <div class="field"><label>Sleep Hrs</label><input type="number" id="sleep-hrs" placeholder="8.3" step="0.1" min="0" max="14"></div>
        <div class="field"><label>RHR</label><input type="number" id="rhr" placeholder="52" min="30" max="120"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Resp Rate</label><input type="number" id="resp" placeholder="15.4" step="0.1" min="8" max="25"></div>
        <div class="field"><label>Deep Sleep</label>
          <select id="deep-sleep">
            <option value="">Select</option>
            <option>Normal</option><option>Slightly Low</option>
            <option>Low</option><option>Very Low</option><option>High</option>
          </select>
        </div>
      </div>
    </div>

    <!-- PHYSICAL FEEL -->
    <div class="section-label">Physical Feel</div>
    <div class="card">
      <div style="margin-bottom:16px;">
        <div class="field" style="margin-bottom:6px;"><label>Energy Level</label></div>
        <div class="slider-wrap">
          <input type="range" id="energy" min="1" max="10" value="7" oninput="updateSlider('energy','energy-val')">
          <div class="slider-val" id="energy-val">7</div>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <div class="field" style="margin-bottom:6px;"><label>Soreness Level</label></div>
        <div class="slider-wrap">
          <input type="range" id="soreness" min="1" max="10" value="3" oninput="updateSlider('soreness','soreness-val')">
          <div class="slider-val" id="soreness-val">3</div>
        </div>
      </div>
      <div class="field">
        <label>Joint / Pain Notes</label>
        <input type="text" id="joint-notes" placeholder="e.g. Tight left ankle, right knee fine">
      </div>
    </div>

    <!-- PERFORMANCE -->
    <div class="section-label">Performance</div>
    <div class="card">
      <div style="margin-bottom:16px;">
        <div class="field" style="margin-bottom:6px;"><label>Practice / Game Rating</label></div>
        <div class="slider-wrap">
          <input type="range" id="perf" min="1" max="10" value="7" oninput="updateSlider('perf','perf-val')">
          <div class="slider-val" id="perf-val">7</div>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <div class="field" style="margin-bottom:6px;"><label>Mood / Internal State</label></div>
        <div class="slider-wrap">
          <input type="range" id="mood" min="1" max="10" value="7" oninput="updateSlider('mood','mood-val')">
          <div class="slider-val" id="mood-val">7</div>
        </div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Mental Sharpness</label>
          <select id="mental-sharp">
            <option value="">Select</option>
            <option>Elite</option><option>Sharp</option>
            <option>Moderate</option><option>Foggy</option><option>Off</option>
          </select>
        </div>
        <div class="field"><label>Competitive Feel</label>
          <select id="comp-feel">
            <option value="">Select</option>
            <option>In the zone</option><option>Present</option>
            <option>Tight</option><option>Reactive</option><option>Disconnected</option>
          </select>
        </div>
      </div>
    </div>

    <!-- FOOD LOG -->
    <div class="section-label">Food Log</div>
    <div class="card">
      <div class="field" style="margin-bottom:12px;">
        <label>Breakfast</label>
        <textarea id="food-breakfast" placeholder="What did you eat? Approximate portions..."></textarea>
      </div>
      <div class="field" style="margin-bottom:12px;">
        <label>Lunch</label>
        <textarea id="food-lunch" placeholder="What did you eat?"></textarea>
      </div>
      <div class="field" style="margin-bottom:12px;">
        <label>Dinner</label>
        <textarea id="food-dinner" placeholder="What did you eat?"></textarea>
      </div>
      <div class="field" style="margin-bottom:12px;">
        <label>Snacks / Pre &amp; Post Workout</label>
        <textarea id="food-snacks" placeholder="Shakes, bridge snacks, pre-game fuel, bedtime protein, etc."></textarea>
      </div>
      <div class="grid-2">
        <div class="field"><label>Est. Protein (g)</label>
          <input type="number" id="protein-est" placeholder="190" min="0" max="500">
        </div>
        <div class="field"><label>Hydration (L)</label>
          <input type="number" id="hydration" placeholder="3.5" step="0.5" min="0" max="10">
        </div>
      </div>
    </div>

    <!-- NOTES -->
    <div class="section-label">Notes</div>
    <div class="card">
      <div class="field">
        <label>How did you feel? Practice &amp; game observations. Anything worth logging.</label>
        <textarea id="notes" style="min-height:140px;"
          placeholder="Walk through the day. How was practice or the game? How did you compete mentally? What was your body doing? Spiritual check-in. Anything unusual..."></textarea>
      </div>
    </div>

    <button class="btn-submit" id="log-save-btn" onclick="saveLog()">SAVE ENTRY &#8594; SHEETS</button>
  </div>


  <!-- ═══════════════════════════════════════════
       TAB 2 — HABITS / PROTOCOL TRACKER
  ═══════════════════════════════════════════ -->
  <div class="panel" id="panel-habits">

    <div class="date-bar">
      <div class="date-label" id="habit-date">—</div>
      <select id="habit-day-type" onchange="loadHabits()"
        style="background:transparent;border:none;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;outline:none;">
        <option value="">SELECT DAY TYPE</option>
        <option>MON &#8212; OFF</option>
        <option>TUE &#8212; HEAVY</option>
        <option>WED &#8212; LATE</option>
        <option>THU &#8212; HEAVY</option>
        <option>FRI &#8212; LIGHT</option>
        <option>FRI &#8212; MOD</option>
        <option>SAT &#8212; GAME</option>
        <option>SAT &#8212; LIGHT</option>
        <option>SUN &#8212; GAME</option>
        <option>SUN &#8212; OFF</option>
      </select>
    </div>

    <!-- EMPTY STATE -->
    <div id="habits-empty">
      <div class="empty-state">
        <div class="empty-icon">&#x2705;</div>
        <p>Select your day type above.<br>Your full protocol loads with descriptions.<br>Check each task off as you complete it.</p>
      </div>
    </div>

    <!-- LOADED CONTENT -->
    <div id="habits-content" style="display:none;">

      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-label">Protocol Compliance</span>
          <span class="progress-pct" id="habit-pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="habit-bar"></div>
        </div>
        <div class="progress-count" id="habit-count">0 of 0 tasks complete</div>
      </div>

      <div id="habits-list"></div>

      <button class="btn-submit" id="habit-save-btn" style="margin-top:16px;" onclick="saveHabits()">
        SAVE HABITS &#8594; SHEETS
      </button>

    </div>
  </div>

</div><!-- /container -->

<div class="toast" id="toast"></div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
</script>

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var fmt = new Date().toLocaleDateString('en-US', {
    weekday:'short', month:'short', day:'numeric', year:'numeric'
  }).toUpperCase();
  document.getElementById('log-date').textContent = fmt;
  document.getElementById('habit-date').textContent = fmt;
});

// ─────────────────────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ─────────────────────────────────────────────────────────────
//  SLIDERS
// ─────────────────────────────────────────────────────────────
function updateSlider(id, valId) {
  document.getElementById(valId).textContent = document.getElementById(id).value;
}

// ─────────────────────────────────────────────────────────────
//  LOAD HABITS
// ─────────────────────────────────────────────────────────────
function loadHabits() {
  var dayType = document.getElementById('habit-day-type').value;
  var emptyEl   = document.getElementById('habits-empty');
  var contentEl = document.getElementById('habits-content');
  var listEl    = document.getElementById('habits-list');

  if (!dayType) {
    emptyEl.style.display = '';
    contentEl.style.display = 'none';
    return;
  }

  // Normalize key — HTML entities become real em-dashes in JS
  var key = dayType.replace(/&#8212;/g, '\u2014');
  var sections = DAY_HABITS[key];
  if (!sections) {
    // Try direct match
    sections = DAY_HABITS[dayType];
  }

  emptyEl.style.display = 'none';
  contentEl.style.display = '';

  if (!sections) { listEl.innerHTML = '<p style="color:var(--muted);padding:20px;">Protocol not found.</p>'; return; }

  var html = '';
  for (var i = 0; i < sections.length; i++) {
    var sec = sections[i];
    html += '<div class="habit-cat">' + sec.cat + '</div>';
    for (var j = 0; j < sec.items.length; j++) {
      var item = sec.items[j];
      html += '<div class="check-item" onclick="toggleHabit(this)">';
      html += '<div class="check-box">&#10003;</div>';
      html += '<div class="check-content">';
      html += '<div class="check-title">' + item.t + '</div>';
      html += '<div class="check-desc">' + item.d + '</div>';
      html += '</div>';
      html += '</div>';
    }
  }

  listEl.innerHTML = html;
  updateProgress();
}

function toggleHabit(el) {
  el.classList.toggle('checked');
  updateProgress();
}

function updateProgress() {
  var all  = document.querySelectorAll('#habits-list .check-item');
  var done = document.querySelectorAll('#habits-list .check-item.checked');
  var total = all.length;
  var doneN = done.length;
  var pct   = total ? Math.round((doneN / total) * 100) : 0;

  document.getElementById('habit-pct').textContent   = pct + '%';
  document.getElementById('habit-count').textContent = doneN + ' of ' + total + ' tasks complete';

  var bar = document.getElementById('habit-bar');
  bar.style.width      = pct + '%';
  bar.style.background = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--red)';
}

// ─────────────────────────────────────────────────────────────
//  SAVE LOG → SHEETS
// ─────────────────────────────────────────────────────────────
function saveLog() {
  var btn = document.getElementById('log-save-btn');
  btn.textContent = 'SAVING...';
  btn.disabled = true;

  var now = new Date();
  var row = [
    now.toISOString(),
    now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' }).toUpperCase(),
    document.getElementById('log-day-type').value,
    document.getElementById('hrv').value,
    document.getElementById('recovery').value,
    document.getElementById('strain').value,
    document.getElementById('sleep-score').value,
    document.getElementById('sleep-hrs').value,
    document.getElementById('rhr').value,
    document.getElementById('resp').value,
    document.getElementById('deep-sleep').value,
    document.getElementById('energy').value,
    document.getElementById('soreness').value,
    document.getElementById('joint-notes').value,
    document.getElementById('perf').value,
    document.getElementById('mood').value,
    document.getElementById('mental-sharp').value,
    document.getElementById('comp-feel').value,
    document.getElementById('food-breakfast').value,
    document.getElementById('food-lunch').value,
    document.getElementById('food-dinner').value,
    document.getElementById('food-snacks').value,
    document.getElementById('protein-est').value,
    document.getElementById('hydration').value,
    document.getElementById('notes').value
  ];

  fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'logEntry', row: row })
  })
  .then(function()  { showToast('Entry saved to Sheets!'); resetLog(); })
  .catch(function() { showToast('Saved locally — sync when online'); resetLog(); })
  .finally(function() {
    btn.textContent = 'SAVE ENTRY \u2192 SHEETS';
    btn.disabled = false;
  });
}

// ─────────────────────────────────────────────────────────────
//  SAVE HABITS → SHEETS
// ─────────────────────────────────────────────────────────────
function saveHabits() {
  var btn = document.getElementById('habit-save-btn');
  btn.textContent = 'SAVING...';
  btn.disabled = true;

  var dayType = document.getElementById('habit-day-type').value;
  var all     = document.querySelectorAll('#habits-list .check-item');
  var done    = document.querySelectorAll('#habits-list .check-item.checked');
  var total   = all.length;
  var doneN   = done.length;
  var pct     = total ? Math.round((doneN / total) * 100) : 0;

  var doneList    = [];
  var missingList = [];
  all.forEach(function(item) {
    var title = item.querySelector('.check-title').textContent;
    if (item.classList.contains('checked')) doneList.push(title);
    else missingList.push(title);
  });

  var row = [
    new Date().toISOString(),
    new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' }).toUpperCase(),
    dayType,
    doneN + '/' + total,
    pct + '%',
    doneList.join(' | '),
    missingList.join(' | ')
  ];

  fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'logHabits', row: row })
  })
  .then(function()  { showToast('Habits saved — ' + pct + '% compliance'); })
  .catch(function() { showToast('Saved — ' + pct + '% compliance'); })
  .finally(function() {
    btn.textContent = 'SAVE HABITS \u2192 SHEETS';
    btn.disabled = false;
  });
}

// ─────────────────────────────────────────────────────────────
//  RESET LOG FORM
// ─────────────────────────────────────────────────────────────
function resetLog() {
  ['hrv','recovery','strain','sleep-score','sleep-hrs','rhr','resp',
   'joint-notes','food-breakfast','food-lunch','food-dinner',
   'food-snacks','protein-est','hydration','notes'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  ['deep-sleep','mental-sharp','comp-feel','log-day-type'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  ['energy','soreness','perf','mood'].forEach(function(id) {
    document.getElementById(id).value = 7;
  });
  updateSlider('energy',  'energy-val');
  updateSlider('soreness','soreness-val');
  updateSlider('perf',    'perf-val');
  updateSlider('mood',    'mood-val');
}

// ─────────────────────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}
